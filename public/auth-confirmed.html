<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D121A" />
    <title>Email confirmed | Beerva</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d121a;
        --card: #182335;
        --surface: #111827;
        --border: rgba(148, 163, 184, 0.22);
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #f59e0b;
        --primary-soft: rgba(245, 158, 11, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.12), transparent 34rem),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 32px 26px;
        text-align: center;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }

      .logo {
        width: 84px;
        height: 80px;
        object-fit: contain;
        margin-bottom: 18px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        background: var(--primary-soft);
        border: 1px solid rgba(245, 158, 11, 0.28);
        color: var(--primary);
        font-size: 15px;
        font-weight: 800;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 9vw, 44px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .note {
        margin-top: 22px;
        padding: 14px 16px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: #cbd5e1;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/beerva-logo-transparent.png" alt="Beerva" />
      <div class="brand">Beerva</div>
      <h1>You have been confirmed.</h1>
      <p>Your email is officially on the guest list. Head back to the app and continue your very serious pint-tracking career.</p>
      <p class="note">This tab has done its job. Like a good bartender, it knows when to stop pouring.</p>
    </main>
  </body>
</html>
