<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="application-name" content="Beerva" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Beerva" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/beerva-apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/beerva-apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/beerva-apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/beerva-apple-touch-icon-120.png" />
    <title>Beerva</title>
    <style id="expo-reset">
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #0F172A;
      }

      body {
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      input, textarea {
        -webkit-user-select: auto;
        user-select: auto;
      }

      ::-webkit-scrollbar {
        display: none;
      }

      * {
        scrollbar-width: none;
      }

      #root {
        display: flex;
        flex: 1;
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Beerva.</noscript>
    <div id="root"></div>
  </body>
</html>
